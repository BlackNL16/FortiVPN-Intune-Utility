<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortiClientVPN Logo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white p-4">

    <!-- Main logo container with fixed square dimensions -->
    <div class="flex flex-col items-center justify-center w-[240px] h-[240px] p-8 bg-slate-800 rounded-3xl shadow-xl transition-transform duration-300 hover:scale-105">
        
        <!-- SVG Shield Icon -->
        <div class="flex-shrink-0">
            <svg class="w-20 h-20 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <path d="M12 16a4 4 0 100-8 4 4 0 000 8z"></path>
                <path d="M12 16v-4"></path>
                <path d="M14.5 13.5l-2.5 2.5"></path>
            </svg>
        </div>

        <!-- Logo text -->
        <div class="flex flex-col text-center mt-4">
            <h1 class="text-xl font-extrabold text-white">FortiClientVPN</h1>
        </div>
    </div>

</body>
</html>
